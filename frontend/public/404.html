<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Activity Stats</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the path into the query string so index.html can restore it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + (window.__GITHUB_PAGES_DEPTH__ || 1)).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '')) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
